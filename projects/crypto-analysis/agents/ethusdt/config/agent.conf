# ETHUSDT Agent Configuration
# Dedicated configuration for Ethereum trading agent

[agent]
name = ETHUSDT_Specialist_Agent
version = 1.0.0
symbol = ETHUSDT
timezone = UTC

[data]
# ETH-specific data sources
primary_timeframe = 1h
secondary_timeframes = 4h,1d
data_directory = /root/.openclaw/workspace/data/binance/ETHUSDT

[trading]
# ETH-optimized parameters
strategy = selective_momentum_v2
risk_per_trade = 0.03
leverage = 5
max_trades_per_day = 3
cooldown_minutes = 60

[entry]
# ETH-specific entry criteria
ema_fast = 9
ema_slow = 21
rsi_period = 14
rsi_min = 40
rsi_max = 75
volume_threshold = 1.0
consecutive_bullish = 2
require_confirmation = true
max_range_location = 70

[risk]
# Risk management
atr_multiplier_stop = 1.5
atr_multiplier_target = 3.0
min_rr = 2.0
position_scale = true
initial_scale = 0.5
add_scale = 0.5

[filters]
# ETH-specific filters
max_volatility = 4.0
trading_hours = 24/7

[notifications]
# Alert settings
enabled = true
on_setup_found = true
on_trade_entry = true
on_trade_exit = true
silent_hours = 23:00-07:00

[state]
state_file = /root/.openclaw/workspace/projects/crypto-analysis/agents/ethusdt/state/agent_state.json
log_level = INFO
